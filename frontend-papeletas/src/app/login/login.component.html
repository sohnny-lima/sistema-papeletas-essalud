<div class="login-page relative h-dvh overflow-hidden [background:var(--essalud-gradient)] px-4 text-slate-900">
  <main class="relative z-10 flex h-full items-center justify-center">
    <section class="login-card-wrap">
      <div class="login-card">
        <div class="login-logo-wrap">
          <div class="login-logo">
            <img src="assets/logo.png" alt="EsSalud">
          </div>
        </div>

        <form (ngSubmit)="onSubmit()" class="login-form" #loginForm="ngForm">
          <div class="login-field">
            <label for="username">Usuario</label>
            <div class="group relative">
              <i class="bi bi-person login-input-icon"></i>
              <input type="text"
                     id="username"
                     name="username"
                     [(ngModel)]="nombreUsuario"
                     required
                     autocomplete="username"
                     class="login-input"
                     placeholder="Usuario">
            </div>
          </div>

          <div class="login-field">
            <label for="password">Contraseña</label>
            <div class="group relative">
              <i class="bi bi-lock login-input-icon"></i>
              <input [type]="mostrarContrasena ? 'text' : 'password'"
                     id="password"
                     name="password"
                     [(ngModel)]="contrasena"
                     required
                     autocomplete="current-password"
                     class="login-input login-input-password"
                     placeholder="Contraseña">
              <button type="button"
                      (click)="toggleMostrarContrasena()"
                      class="login-eye-btn"
                      [attr.aria-label]="mostrarContrasena ? 'Ocultar contraseña' : 'Mostrar contraseña'">
                <i class="bi" [ngClass]="mostrarContrasena ? 'bi-eye-slash' : 'bi-eye'"></i>
              </button>
            </div>
          </div>

          <div *ngIf="errorMessage" class="flex items-start gap-3 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
            <i class="bi bi-exclamation-triangle-fill mt-0.5"></i>
            <span>{{ errorMessage }}</span>
          </div>

          <div *ngIf="successMessage" class="flex items-start gap-3 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">
            <i class="bi bi-check-circle-fill mt-0.5"></i>
            <span>{{ successMessage }}</span>
          </div>

          <button type="submit"
                  [disabled]="loginForm.invalid"
                  class="login-submit">
            <span>Ingresar</span>
          </button>
        </form>
      </div>
    </section>
  </main>
</div>
